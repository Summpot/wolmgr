# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: 'Additional image tag (e.g. v1.0.0)'
        required: false
        type: string

permissions:
  contents: read
  packages: write

env:
  IMAGE_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  check:
    name: Check frontend and backend
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm -s build:frontend

      - name: Check backend
        run: cargo check -p wolmgr-backend

  docker:
    name: Build ${{ matrix.arch }} Docker image
    needs: [check]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image name
        id: image
        shell: bash
        run: |
          image="${IMAGE_REGISTRY}/${IMAGE_NAME}"
          echo "name=${image,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.image.outputs.name }}:${{ github.sha }}-${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,scope=${{ matrix.arch }},mode=max

  manifest:
    name: Create Docker manifest
    needs: [docker]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - name: Resolve image name
        id: image
        shell: bash
        run: |
          image="${IMAGE_REGISTRY}/${IMAGE_NAME}"
          echo "name=${image,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create merged manifest
        shell: bash
        run: |
          args=(
            --tag "${{ steps.image.outputs.name }}:${{ github.sha }}"
            --tag "${{ steps.image.outputs.name }}:latest"
          )
          if [[ -n "${{ inputs.tag }}" ]]; then
            args+=(--tag "${{ steps.image.outputs.name }}:${{ inputs.tag }}")
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            args+=(--tag "${{ steps.image.outputs.name }}:${GITHUB_REF#refs/tags/}")
          fi
          args+=(
            "${{ steps.image.outputs.name }}:${{ github.sha }}-amd64"
            "${{ steps.image.outputs.name }}:${{ github.sha }}-arm64"
          )
          docker buildx imagetools create "${args[@]}"
